[CitcomS]
steps = 10000
solver = full


[CitcomS.job]
name = plst_3
walltime = 40 *hour
queue = normal
#queue = high

#[CitcomS.tacc-ranger]
#tpn = 16

[CitcomS.controller]
monitoringFrequency = 10
checkpointFrequency=10

[CitcomS.solver]
datadir = /u/sciteam/hu1/scratch/GlobalModel257_Tracer_plume/DATA/%RANK
datafile = global
datadir_old = /u/sciteam/hu1/scratch/GlobalModel257_Tracer_plume/Restart
datafile_old = global
rayleigh = 2.6e+08
#verbose=on

[CitcomS.solver.mesher]
nprocx = 8
nprocy = 8
nprocz = 6
nodex  = 257
nodey = 257
nodez = 97
levels = 4
coor = 1
coor_file = Global.coor.global.dat

[CitcomS.solver.tsolver]
#fixed_timestep = 7.7748e-8
#fixed_timestep = 7.7748e-9

[CitcomS.solver.vsolver]
#accuracy = 1e-06 # for CitcomS v3.0 and before
Solver=multigrid
accuracy = 1e-06
tole_compressibility = 1e-07
vlowstep=5000
remove_rigid_rotation=0

[CitcomS.solver.ic]
#tic_method = -1
#zero_elapsed_time=on
solution_cycles_init = 0
restart = on

[CitcomS.solver.bc]
topvbc = 1
topvbxval = 0
topvbyval = 0
toptbc = 1
toptbcval = 0.0
bottbc = 1
bottbcval = 1.2

[CitcomS.solver.output]
#output_format = ascii
output_optional = comp_nd,surf,botm
#,tracer

[CitcomS.solver.tracer]
tracer = 1
tracer_ic_method = 0
tracers_per_element = 27
tracer_file = tracer.dat
itracer_warnings=0
# tracer_flavors is n_chem + 1 for active tracers
# but is n_chem for passive tracers
tracer_flavors = 10
buoy_type = 1
chemical_buoyancy = on
#buoyancy_ratio = -0.5,-2.0,-0.5
#buoyancy_ratio = -0.0,-2.0,-1.5,-1.0,-0.5,-0.1,-1.5,-1.0,1.0
buoyancy_ratio = -0.0,-5.3,1.0,-5.3,0.8,1.0,-1.5,-1.0,1.0
ic_method_for_flavors = 0
z_interface = 0.995,0.99,0.98,0.96,0.95,0.94,0.93,0.92,0.9
#z_interface = 0.997,0.98,0.97

[CitcomS.solver.param]
file_vbcs = 1
vel_bound_file = /u/sciteam/hu1/BC_files/Muller_2016/bvel_deformable_trench/bvel
lith_age = 1
start_age = 150
mantle_temp = 0.7
lith_age_file = /u/sciteam/hu1/BC_files/Muller_2016/Age_global_257/age
flag_depth_new_file = /u/sciteam/hu1/BC_files/Muller_2016/create_new_trench/topology_new_trench_minlen8.
flag_depth_file=/u/sciteam/hu1/BC_files/Muller_2016/dense_sz/dense_subduction.
tf_file=/u/sciteam/hu1/BC_files/Muller_2016/global257_transform_boundary_asm_files/asm_depth.
lith_age_time = 1
lith_age_depth = 0.02

[CitcomS.solver.const]
z_lith=0.007
z_410=0.06435
#z_410=0.06
#z_lmantle=0.11

[CitcomS.solver.visc]
VISC_UPDATE = on
num_mat = 4
#visc0 = 5,0.05,0.01,30
visc0 = 0.1,0.1,1.0,30
TDEPV = on
#viscE = 2,2.5,1.0,1.0
viscE = 3,5,3,2
viscT = 0.1,0.1,0.3,0.3
SDEPV = off
sdepv_misfit=0.5
sdepv_expt=3,3,3,1
PDEPV = off
pdepv_a = 1e18,1e18,1e18,1e18
pdepv_b = 1,1,1,1
#yield stress scaling: x2.5e5 Pa (the factor 1e4 hardcoded in visc_from_P)
pdepv_y = 8e2,8e2,1e3,1e4
pdepv_eff = off
#pdepv_offset = off
low_visc_channel=off
lv_min_radius=0.97
lv_max_radius=0.999
lv_channel_thickness=0.02
lv_reduction=0.01
VMIN = on
visc_min = 0.01
VMAX = on
visc_max= 100.0
CDEPV = on
# first entry is for background visc
cdepv_ff = 1,0.01,2000,1000,1,0.1,1,1,1,1

[CitcomS.solver.phase]
Ra_410=2.6e+08
clapeyron410=0.019
transT410=0.65
width410=0.01
Ra_670=6.06e+08
clapeyron670=-0.01
transT670=0.65
width670=0.01
